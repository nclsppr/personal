<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>404 — Page not found · Nicolas Pieper</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
    <link rel="stylesheet" href="/assets/css/site.css">
    <script>(function(){try{var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t}catch(e){}})()</script>
    <style>
        .err-wrap { min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left)); }
        .err { text-align: center; max-width: 34rem; }
        .err .code { font-family: var(--font-mono); color: var(--accent-ink); font-size: 0.8rem; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div class="err-wrap">
        <main class="err">
            <p class="code">HTTP 404 — NOT_FOUND</p>
            <h1>Page not found.</h1>
            <p>This page does not exist — or has been moved during the 2026 redesign.</p>
            <p lang="fr">Cette page n'existe pas — ou a été déplacée lors de la refonte 2026.</p>
            <div class="btn-row" style="justify-content: center;">
                <a class="btn btn-primary" href="/">Home / Accueil</a>
                <a class="btn btn-ghost" href="/cv/">CV</a>
            </div>
        </main>
    </div>
</body>
</html>
