<!DOCTYPE html>
<!-- Gabarit de la miniature de partage (og-home.png, 1200x630).
     Rendu par scripts/generate-og-image.sh (Chrome headless, capture d'écran).
     Reprend les jetons du design system v2026 : ivoire, encre, International
     Orange #FF4F00, Source Serif 4 / Inter / JetBrains Mono auto-hébergées,
     logo-mark et portrait sticker actuels. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Inter';
    font-weight: 100 900;
    src: url('../assets/fonts/inter-var-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Source Serif 4';
    font-weight: 100 900;
    src: url('../assets/fonts/sourceserif4-var-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-weight: 100 800;
    src: url('../assets/fonts/jetbrainsmono-var-latin.woff2') format('woff2');
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #FAF9F5;
    color: #171716;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
  }
  .bar { height: 14px; background: #FF4F00; flex: none; }
  .card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 84px 0 92px;
    gap: 48px;
  }
  .text { max-width: 720px; }
  .logo {
    width: 92px;
    height: 92px;
    border-radius: 12px;
    display: block;
    margin-bottom: 44px;
  }
  h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 92px;
    font-weight: 650;
    letter-spacing: -0.015em;
    line-height: 1.05;
    margin-bottom: 22px;
  }
  .role {
    font-size: 36px;
    font-weight: 500;
    color: #45443F;
    margin-bottom: 10px;
  }
  .tagline {
    font-size: 36px;
    color: #66655E;
    margin-bottom: 46px;
  }
  .metrics {
    font-family: 'JetBrains Mono', monospace;
    font-size: 25px;
    font-weight: 600;
    color: #C23C00;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .metrics .sep { color: #CFCCC0; padding: 0 14px; }
  .portrait {
    width: 300px;
    flex: none;
    filter: drop-shadow(0 14px 36px rgba(23, 23, 22, 0.22));
  }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="card">
    <div class="text">
      <img class="logo" src="../assets/img/logo-mark.png" alt="">
      <h1>Nicolas Pieper</h1>
      <p class="role">Engineering Manager · Luxembourg</p>
      <p class="tagline">Building secure platforms that scale.</p>
      <p class="metrics">1M+ devices<span class="sep">·</span>10M reports/month<span class="sep">·</span>10 engineers</p>
    </div>
    <img class="portrait" src="../assets/img/nicolas-sticker.png" alt="">
  </div>
</body>
</html>
